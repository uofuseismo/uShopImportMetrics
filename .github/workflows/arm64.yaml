name: Arm64 Compile
run-name: ${{ github.actor }} Compiling ARM64
on:
  push:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    name: Build on ${{ matrix.distro }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        BUILD_TARGET: [Release]
    steps:
      - name: Build prerequisites
        env:
        run: |
          apt-get install -y g++
          apt-get install -y tar
          apt-get install -y wget
          apt-get install -y file
          apt-get install -y clang
          apt-get install -y make
          apt-get install -y libcurl4-openssl-dev
          apt-get install -y cmake
          apt-get install -y ninja-build 
          apt-get install libboost-all-dev
          mkdir -p /usr/local/lib
          mkdir -p /usr/local/include
          wget -q https://github.com/EarthScope/libmseed/archive/refs/tags/v3.2.4.tar.gz
          tar -xf v3.2.4.tar.gz
          rm v3.2.4.tar.gz
          cd libmseed-3.2.4
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DBUILD_STATIC_LIBS=ON -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build
          cmake --install build
          cd ..
          wget -q https://github.com/EarthScope/libslink/archive/refs/tags/v4.2.0.tar.gz
          tar -xf v4.2.0.tar.gz
          rm v4.2.0.tar.gz
          cd libslink-4.2.0
          make static
          make install
          mv libslink.a /usr/local/lib/
          
       
